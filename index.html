<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CT Scan Scheduling System - National Guard Hospital" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>CT Scan Scheduling System - National Guard Hospital</title>
  </head>
  <body>
    <script>
      (() => {
        const storageKey = 'theme-preference';
        const legacyKey = 'national-theme';
        const saved = localStorage.getItem(storageKey) || localStorage.getItem(legacyKey) || 'system';
        const mode = ['light', 'dark', 'system'].includes(saved) ? saved : 'system';
        const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolved = mode === 'system' ? (systemDark ? 'dark' : 'light') : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.classList.toggle('dark', resolved === 'dark');
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
